name: Bug Report (canola)
description: Report a bug on the active canola track
title: 'bug(canola): '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        You are filing against the `canola` branch.

        - `canola` is the active refactor track.
        - Use `vim.g.canola` before the plugin loads.
        - If you need drop-in `require('oil').setup(...)` compatibility, use **Bug Report (main / oil-compatible)** instead.

  - type: checkboxes
    attributes:
      label: Prerequisites
      options:
        - label:
            I have searched [existing
            issues](https://github.com/barrettruth/canola.nvim/issues)
          required: true
        - label: I have updated to the latest `canola` branch
          required: true
        - label:
            This report targets the `canola` branch, the active
            non-backwards-compatible track
          required: true
        - label: I ran the repro below with `branch = 'canola'` left intact
          required: true

  - type: textarea
    attributes:
      label: 'Neovim version'
      description: 'Output of `nvim --version`'
      render: text
    validations:
      required: true

  - type: input
    attributes:
      label: 'Operating system'
      placeholder: 'e.g. Arch Linux, macOS 15, Ubuntu 24.04'
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Minimal reproduction
      description: |
        Save the script below as `repro.lua`, edit only what you need to
        reproduce the bug, and run:
        ```
        nvim -u repro.lua
        ```
        Do not remove or change `branch = 'canola'`. That pin tells us this
        issue is on the active canola track.
      render: lua
      value: |
        vim.env.LAZY_STDPATH = '.repro'
        load(vim.fn.system('curl -s https://raw.githubusercontent.com/folke/lazy.nvim/main/bootstrap.lua'))()
        require('lazy').setup({
          spec = {
            {
              'barrettruth/canola.nvim',
              branch = 'canola',
              init = function()
                vim.g.canola = {}
              end,
            },
          },
        })
    validations:
      required: true
