name: Bug Report (main / oil-compatible)
description: Report a bug on the backwards-compatible oil track
title: 'bug(main): '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        You are filing against the `main` branch.

        - `main` is the backwards-compatible oil track.
        - Use `require('oil').setup(...)`.
        - If your repro uses `vim.g.canola` or `require('canola')`, use **Bug Report (canola)** instead.

  - type: checkboxes
    attributes:
      label: Prerequisites
      options:
        - label:
            I have searched [existing
            issues](https://github.com/barrettruth/canola.nvim/issues)
          required: true
        - label: I have updated to the latest `main` branch
          required: true
        - label:
            This report targets the `main` branch, the backwards-compatible
            oil track
          required: true
        - label: I ran the repro below with `branch = 'main'` left intact
          required: true

  - type: textarea
    attributes:
      label: 'Neovim version'
      description: 'Output of `nvim --version`'
      render: text
    validations:
      required: true

  - type: input
    attributes:
      label: 'Operating system'
      placeholder: 'e.g. Arch Linux, macOS 15, Ubuntu 24.04'
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Minimal reproduction
      description: |
        Save the script below as `repro.lua`, edit only what you need to
        reproduce the bug, and run:
        ```
        nvim -u repro.lua
        ```
        Do not remove or change `branch = 'main'`. That pin tells us this issue
        is on the backwards-compatible track.
      render: lua
      value: |
        vim.env.LAZY_STDPATH = '.repro'
        load(vim.fn.system('curl -s https://raw.githubusercontent.com/folke/lazy.nvim/main/bootstrap.lua'))()
        require('lazy').setup({
          spec = {
            {
              'barrettruth/canola.nvim',
              branch = 'main',
              config = function()
                require('oil').setup({})
              end,
            },
          },
        })
    validations:
      required: true
